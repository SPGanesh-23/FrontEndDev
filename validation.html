<!doctype html>
<html>
  <head>
    <title>Registration Form</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #e7f2ff 0%, #f8fbff 100%);
        color: #1a1a1a;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }

      .container {
        width: min(100%, 460px);
        background: #ffffff;
        margin: 20px auto;
        padding: 26px;
        border-radius: 14px;
        box-shadow: 0 10px 25px rgba(35, 71, 124, 0.15);
        border: 1px solid #dbe7f8;
      }

      h2 {
        text-align: center;
        margin-top: 0;
        color: #27496d;
      }

      label {
        display: block;
        font-weight: 600;
        margin: 12px 0 4px;
        color: #2f4f74;
      }

      input,
      select {
        width: 100%;
        padding: 10px 12px;
        margin-bottom: 10px;
        border: 1px solid #cbd6e8;
        border-radius: 6px;
        background: #fdfdff;
        font-size: 15px;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      input:focus,
      select:focus {
        outline: none;
        border-color: #5b8fcf;
        box-shadow: 0 0 0 3px rgba(91, 143, 207, 0.2);
      }

      .button-row {
        display: flex;
        gap: 10px;
        margin-top: 12px;
      }

      button {
        flex: 1;
        padding: 10px 12px;
        border: none;
        border-radius: 8px;
        color: #fff;
        font-size: 16px;
        cursor: pointer;
        font-weight: 700;
        transition: transform 0.15s ease, opacity 0.2s ease;
      }

      button:hover {
        opacity: 0.92;
        transform: translateY(-1px);
      }

      .submit {
        background: linear-gradient(90deg, #1282ff 0%, #2d8cff 100%);
      }

      .reset {
        background: linear-gradient(90deg, #ea4335 0%, #ff6a5f 100%);
      }

      @media (max-width: 520px) {
        .container {
          padding: 18px;
          margin: 12px;
        }

        .button-row {
          flex-direction: column;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Registration Form</h2>
      <form>
        <label>Full Name</label>
        <input type="text" placeholder="Enter Name" required />
        <label>Email</label>
        <input type="email" placeholder="Enter Email" required />
        <label>Password</label>
        <input type="password" placeholder="Enter Password" required />
        <label>Gender</label><br />
        <input type="radio" name="gender" /> Male
        <input type="radio" name="gender" /> Female <br /><br />
        <label>Course</label>
        <select>
          <option>BCA</option>
          <option>B.Sc</option>
          <option>B.Com</option>
          <option>BBA</option>
        </select>
        <label>Phone Number</label>
        <input type="tel" placeholder="Enter Phone Number" />
        <br /><br />
        <button class="submit">Submit</button>
        <button type="reset" class="reset">Reset</button>
      </form>
    </div>
  </body>
</html>
